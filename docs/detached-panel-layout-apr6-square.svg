<svg width="1600" height="1600" viewBox="0 0 1600 1600" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="sqbg" x1="0" y1="0" x2="1600" y2="1600" gradientUnits="userSpaceOnUse">
      <stop stop-color="#050A13"/>
      <stop offset="1" stop-color="#0A1320"/>
    </linearGradient>
    <linearGradient id="sqpanel" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#16253A"/>
      <stop offset="1" stop-color="#0B101A"/>
    </linearGradient>
    <filter id="sqglow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="sqgrid" width="26" height="26" patternUnits="userSpaceOnUse">
      <path d="M 26 0 L 0 0 0 26" stroke="#11314A" stroke-width="1" opacity="0.35"/>
    </pattern>
    <style>
      .t1 { font: 700 26px 'Rajdhani', Arial; letter-spacing: 2px; fill: #EAF8FF; }
      .t2 { font: 700 18px 'Rajdhani', Arial; letter-spacing: 1.3px; fill: #CBEFFF; }
      .t3 { font: 700 14px 'Rajdhani', Arial; letter-spacing: 1.1px; fill: #EAF8FF; }
      .mono { font: 400 13px 'Share Tech Mono', monospace; fill: #BFD0DE; }
      .monoSmall { font: 400 11px 'Share Tech Mono', monospace; fill: #7B98B0; }
      .cyan { fill: #00D4FF; }
      .amber { fill: #FFB347; }
      .red { fill: #FF6A60; }
      .green { fill: #79F2A7; }
    </style>
  </defs>

  <rect width="1600" height="1600" fill="url(#sqbg)"/>
  <rect width="1600" height="1600" fill="url(#sqgrid)" opacity="0.2"/>

  <text x="108" y="108" class="t1" fill="#00D4FF">DETACHED PANEL V2 // READABLE OPS LAYOUT</text>
  <text x="108" y="142" class="monoSmall">放大 3 个 commander 对话区；左边放任务 / 后勤 / 兵种池；最右边完整保留编制树</text>

  <g transform="translate(100 190)">
    <rect x="0" y="0" width="1400" height="1120" rx="18" fill="#070B14" stroke="#1C3650" stroke-width="2"/>

    <!-- Top -->
    <rect x="24" y="24" width="1352" height="68" fill="url(#sqpanel)" stroke="#274863"/>
    <text x="44" y="66" class="t1">AI COMMANDER</text>
    <rect x="224" y="40" width="118" height="34" fill="#103041" stroke="#21DFFF"/>
    <text x="254" y="62" class="t3">OPERATIONAL</text>
    <rect x="756" y="40" width="112" height="34" fill="#0E1827" stroke="#345A77"/>
    <text x="774" y="62" class="monoSmall">MONEY  $53,100</text>
    <rect x="880" y="40" width="92" height="34" fill="#1B1720" stroke="#7A5324"/>
    <text x="899" y="62" class="monoSmall amber">FUEL 170%</text>
    <rect x="984" y="40" width="92" height="34" fill="#20161B" stroke="#7A3138"/>
    <text x="1002" y="62" class="monoSmall red">AMMO 170%</text>
    <rect x="1088" y="40" width="92" height="34" fill="#0E1827" stroke="#345A77"/>
    <text x="1107" y="62" class="monoSmall cyan">INTEL 40</text>
    <text x="1250" y="64" class="t1" fill="#00D4FF">00:00:46</text>
    <rect x="24" y="90" width="1352" height="2" fill="#00D4FF" filter="url(#sqglow)"/>

    <!-- Left column -->
    <rect x="24" y="122" width="328" height="870" fill="url(#sqpanel)" stroke="#2A4C63" stroke-width="2"/>
    <text x="46" y="158" class="t2" fill="#FFB347">MISSION + LOGISTICS</text>
    <rect x="46" y="166" width="284" height="2" fill="#FFB347" filter="url(#sqglow)"/>

    <rect x="46" y="186" width="284" height="188" fill="#0D121C" stroke="#355268"/>
    <text x="64" y="216" class="t2">ACTIVE MISSIONS</text>
    <rect x="64" y="232" width="248" height="32" fill="#151B24" stroke="#6D2D32"/>
    <text x="78" y="253" class="mono">1. Hold supply depot</text>
    <text x="236" y="253" class="mono red">CRITICAL</text>
    <rect x="64" y="275" width="248" height="32" fill="#151B24" stroke="#7A5324"/>
    <text x="78" y="296" class="mono">2. Reinforce triangle</text>
    <text x="255" y="296" class="mono amber">73%</text>
    <rect x="64" y="318" width="248" height="32" fill="#151B24" stroke="#355268"/>
    <text x="78" y="339" class="mono">3. Secure depot road</text>

    <rect x="46" y="394" width="284" height="168" fill="#0D121C" stroke="#355268"/>
    <text x="64" y="424" class="t2">LOGISTICS SNAPSHOT</text>
    <text x="64" y="456" class="mono">Fuel reserve</text>
    <rect x="168" y="444" width="130" height="10" fill="#161D27" stroke="#355268"/>
    <rect x="170" y="446" width="84" height="6" fill="#FFB347"/>
