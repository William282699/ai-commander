    <rect x="168" y="478" width="130" height="10" fill="#161D27" stroke="#355268"/>
    <rect x="170" y="480" width="64" height="6" fill="#FF6A60"/>
    <text x="64" y="524" class="mono">Intel confidence</text>
    <rect x="168" y="512" width="130" height="10" fill="#161D27" stroke="#355268"/>
    <rect x="170" y="514" width="104" height="6" fill="#27F0FF"/>

    <rect x="46" y="582" width="284" height="388" fill="#0D121C" stroke="#355268"/>
    <text x="64" y="612" class="t2" fill="#00D4FF">CURRENT UNIT POOL</text>
    <text x="64" y="636" class="monoSmall">这里支持上下滚动，兵种多的时候继续往下刷</text>
    <rect x="302" y="648" width="6" height="286" fill="#16202D" stroke="#264055"/>
    <rect x="303" y="702" width="4" height="88" fill="#20E2FF"/>
    <rect x="64" y="654" width="220" height="30" fill="#121926" stroke="#2E516D"/>
