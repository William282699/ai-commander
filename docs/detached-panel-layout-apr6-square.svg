    <text x="414" y="486" class="mono">"Bridge sector is still the hinge. If we lose Delta, the line folds backward."</text>
    <text x="414" y="518" class="mono">"Recommend triangle first, then re-stabilize the center using the road net."</text>
    <text x="414" y="550" class="monoSmall">08:42 - operational recommendation updated</text>

    <rect x="394" y="602" width="568" height="176" fill="#0D121C" stroke="#355268"/>
    <rect x="414" y="622" width="528" height="30" fill="#151B24" stroke="#3A8B5B"/>
    <text x="430" y="643" class="t3 green">EMILY / LOGISTICS</text>
    <text x="414" y="680" class="mono">"Fuel is workable for a local counter. Ammo is the tighter constraint on Chen's side."</text>
    <text x="414" y="712" class="mono">"I can support reinforcements, but not a long pursuit without resupply."</text>
    <text x="414" y="744" class="monoSmall">08:42 - logistics confirms limited offensive window</text>

    <rect x="394" y="796" width="568" height="174" fill="#0D121C" stroke="#355268"/>
    <text x="414" y="828" class="t2">DECISION BOARD</text>
