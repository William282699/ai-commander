    <rect x="64" y="768" width="220" height="30" fill="#121926" stroke="#2E516D"/>
    <text x="80" y="788" class="mono">Recon</text>
    <text x="242" y="788" class="mono">18</text>
    <rect x="64" y="806" width="220" height="30" fill="#121926" stroke="#2E516D"/>
    <text x="80" y="826" class="mono">Engineers</text>
    <text x="242" y="826" class="mono">12</text>

    <!-- Center -->
    <rect x="372" y="122" width="612" height="870" fill="url(#sqpanel)" stroke="#2A4C63" stroke-width="2"/>
    <text x="394" y="158" class="t2" fill="#00D4FF">COMMANDER COMMS</text>
    <text x="394" y="182" class="monoSmall">每位 commander 至少保留两段以上上下文，不再只有一条短消息</text>
    <rect x="394" y="190" width="568" height="2" fill="#00D4FF" filter="url(#sqglow)"/>

    <rect x="394" y="214" width="568" height="176" fill="#0D121C" stroke="#355268"/>
    <rect x="414" y="234" width="528" height="30" fill="#151B24" stroke="#7A3138"/>
    <text x="430" y="255" class="t3 red">CHEN / COMBAT</text>
    <text x="414" y="292" class="mono">"Enemy armor on the move, north ridge. We can hold if I get one more squad."</text>
    <text x="414" y="324" class="mono">"Last exchange burned ammo fast. If we push now, I need support queued behind me."</text>
    <text x="414" y="356" class="monoSmall">08:41 - combat thread still open</text>

    <rect x="394" y="408" width="568" height="176" fill="#0D121C" stroke="#355268"/>
    <rect x="414" y="428" width="528" height="30" fill="#151B24" stroke="#2E69A0"/>
