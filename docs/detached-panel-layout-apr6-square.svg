    <rect x="798" y="846" width="76" height="34" fill="#143020" stroke="#2F9D58"/>
    <text x="816" y="868" class="t3">APPROVE</text>
    <rect x="884" y="846" width="58" height="34" fill="#2F1417" stroke="#9A313A"/>
    <text x="900" y="868" class="t3">X</text>
    <text x="414" y="914" class="monoSmall">把决策收缩到底部，保证中上区域优先留给 3 个 commander 的上下文对话。</text>

