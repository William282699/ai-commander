<svg width="1600" height="1600" viewBox="0 0 1600 1600" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="1600" gradientUnits="userSpaceOnUse">
      <stop stop-color="#050A13"/>
      <stop offset="0.55" stop-color="#0B1321"/>
      <stop offset="1" stop-color="#060A12"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#172338"/>
      <stop offset="1" stop-color="#0B1018"/>
    </linearGradient>
    <linearGradient id="cyanBorder" x1="0" y1="0" x2="1" y2="0">
      <stop stop-color="#00D4FF" stop-opacity="0"/>
      <stop offset="0.18" stop-color="#00D4FF"/>
      <stop offset="0.82" stop-color="#20E7FF"/>
      <stop offset="1" stop-color="#00D4FF" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="amberBorder" x1="0" y1="0" x2="1" y2="0">
      <stop stop-color="#FF9F1A" stop-opacity="0"/>
      <stop offset="0.18" stop-color="#FF9F1A"/>
      <stop offset="0.82" stop-color="#FFC25B"/>
      <stop offset="1" stop-color="#FF9F1A" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="grid" width="28" height="28" patternUnits="userSpaceOnUse">
      <path d="M 28 0 L 0 0 0 28" stroke="#14314A" stroke-width="1" opacity="0.35"/>
    </pattern>
    <style>
      .h1 { font: 700 26px 'Rajdhani', Arial; letter-spacing: 2px; fill: #EAF8FF; }
      .h2 { font: 700 18px 'Rajdhani', Arial; letter-spacing: 1.2px; fill: #D8F7FF; }
      .h3 { font: 700 14px 'Rajdhani', Arial; letter-spacing: 1px; fill: #DDF4FF; }
      .mono { font: 400 13px 'Share Tech Mono', monospace; fill: #C7D7E5; }
      .monoDim { font: 400 11px 'Share Tech Mono', monospace; fill: #7993AB; }
      .cyan { fill: #00D4FF; }
      .amber { fill: #FFB347; }
      .red { fill: #FF6A60; }
      .green { fill: #79F2A7; }
      .dock { font: 700 12px 'Rajdhani', Arial; letter-spacing: 1px; fill: #EAF8FF; }
    </style>
  </defs>

  <rect width="1600" height="1600" fill="url(#bg)"/>
  <rect width="1600" height="1600" fill="url(#grid)" opacity="0.18"/>

  <text x="96" y="98" class="h1" fill="#00D4FF">DETACHED PANEL V3 // TEAMS-STYLE COMMS</text>
  <text x="96" y="132" class="monoDim">只保留当前系统里真实存在的内容：会话入口、历史聊天、任务/后勤、兵种池、编制树、底部命令区</text>
  <text x="96" y="158" class="monoDim">说明：按你刚才的要求，这张概念图里暂时按 Marcus=logistics / Emily=ops 展示</text>

